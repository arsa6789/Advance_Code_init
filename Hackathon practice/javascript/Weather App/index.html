<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.css"
      integrity="sha512-5A8nwdMOWrSz20fDsjczgUidUBR8liPYU+WymTZP1lmY9G6Oc7HlZv156XqnsgNUzTyMefFTcsFH/tnJE/+xBg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="container">
      <!-- Search Bar -->
      <div class="search">
        <input
          id="city"
          type="text"
          placeholder="Enter your city name"
          spellcheck="false"
        />
        <button id="btn">
          <i class="fa fa-search"></i>
        </button>
      </div>
      <!-- Main Content -->
      <div class="weather">
        <img src="./img/weather1.png" alt="" class="weather-icon" />
        <h1 id="temp" class="temp">22°C</h1>
        <h2 id="cityName" class="city">Tunisia</h2>
        <div class="details">
          <div class="col">
            <img src="./img/weather.png" alt="" />
            <div>
              <p id="humidity" class="humidity">50%</p>
              <p>Humidity</p>
            </div>
          </div>
          <div class="col">
            <img src="./img/wind.png" alt="" />
            <div>
              <p id="wind" class="wind">5 Km/h</p>
              <p>Wind Speed</p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
