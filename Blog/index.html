<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Santagram</title>
    <link rel="shortcut icon" href="./Gemini_Generated_Image_eofls5eofls5eofl-removebg-preview (1).png" type="image/x-icon">
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="logo">Santagram</div>
      <nav class="nav-links">
        <span id="user-greeting" class="hidden"></span>
        <button id="auth-btn" class="btn btn-secondary">Log In</button>
        <button id="logout-btn" class="btn btn-link hidden">Log Out</button>
      </nav>
    </header>

    <main class="container">
      <section id="auth-view" class="auth-card hidden">
        <h2 id="auth-title">Create Account</h2>
        <form id="auth-form">
          <input type="email" id="auth-email" placeholder="Email" required />
          <input
            type="password"
            id="auth-password"
            placeholder="Password"
            minlength="6"
            required
          />
          <button type="submit" id="auth-submit-btn" class="btn btn-primary">
            Sign Up
          </button>
        </form>
        <p class="toggle-text">
          <span id="auth-toggle-msg">Already have an account?</span>
          <a href="#" id="auth-toggle-link">Log In</a>
        </p>
      </section>

      <section id="create-post-view" class="create-card hidden">
        <h3>Submit a new text post</h3>
        <form id="post-form">
          <input
            type="text"
            id="post-title"
            placeholder="Title"
            required
            maxlength="150"
          />
          <textarea
            id="post-desc"
            placeholder="Body text (optional)"
            rows="4"
          ></textarea>
          <button type="submit" class="btn btn-primary">Post</button>
        </form>
      </section>

      <section class="feed-section">
        <h2>Recent Posts</h2>
        <div id="posts-container">
          <p class="loading">Fetching threads...</p>
        </div>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
